<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Generate Time Converter Link</title>
    <meta name="description" content="This tool is a webpage that displays a timestamp from one timezone in the user's local time, accounting for daylight saving time. This means it takes the timestamp and the displays it in both daylight time and standard time, according to the user's local timezone.">

	<script src="https://cdn.jsdelivr.net/npm/moment@2.30.1/moment.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/moment-timezone@0.5.45/builds/moment-timezone-with-data.min.js"></script>

	<style>
		body {
            margin: 0;
            min-height: 100vh;
            padding: 15px;
            box-sizing: border-box;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f0f0f;
            color: white;
            font-family: Arial, sans-serif;
        }

		.box {
            background: #1c1c1c;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 550px;
            box-sizing: border-box;
        }

		h2 {
			margin-top: 0;
		}

		.field {
			margin-bottom: 20px;
		}

		label {
			display: block;
			margin-bottom: 8px;
			color: #aaa;
			font-size: 14px;
		}

		input,
		select {
			width: 100%;
			box-sizing: border-box;
		}

		input[type="time"],
		select {
			padding: 10px;
			border: none;
			border-radius: 8px;
			background: #2a2a2a;
			color: white;
			font-size: 16px;
		}

		select {
			height: 44px;
		}

		button {
			width: 100%;
			padding: 12px;
			border: none;
			border-radius: 8px;
			background: #60a5fa;
			color: white;
			font-size: 16px;
			cursor: pointer;
		}

		button:hover {
			opacity: 0.9;
		}

		.result {
            margin-top: 20px;
            display: none;
        }

        .copy-box {
            position: relative;
            margin-top: 10px;
            padding: 12px;
            background: #2a2a2a;
            border-radius: 8px;
            cursor: pointer;
            word-break: break-all;
            transition: background 0.2s;
            color: #d4d4d4;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .copy-box:hover {
            background: #353535;
        }

        .copy-icon {
            flex-shrink: 0;
            font-size: 16px;
            opacity: 0.7;
            transition: opacity 0.2s, transform 0.2s;
        }

        .copy-box:hover .copy-icon {
            opacity: 1;
            transform: scale(1.05);
        }

        #generatedLink {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            font-size: 14px;
            white-space: pre-wrap;
            word-break: break-all;
            color: #d4d4d4;
        }

        .tooltip {
            position: absolute;
            bottom: calc(100% + 8px);
            left: 50%;
            transform: translateX(-50%);
            background: #111;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 12px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .tooltip.show {
            opacity: 1;
        }

        @media (max-width: 600px) {
            .box {
                padding: 20px;
            }

            h2 {
                font-size: 1.5rem;
            }

            input[type="time"],
            select,
            button {
                font-size: 16px;
            }

            .result {
                font-size: 14px;
            }
        }
	</style>
</head>
<body>

<div class="box">
	<h2>Generate Time Converter Link</h2>

	<div class="field">
		<label for="time">Time</label>
		<input type="time" id="time" value="13:00">
	</div>

	<div class="field">
		<label for="timezone">Timezone</label>
		<select id="timezone"></select>
	</div>

	<button onclick="generateLink()">Generate Link</button>

	<div class="result" id="result">
        <div><strong>Generated Link:</strong></div>

        <div
            class="copy-box"
            id="copyBox"
            onclick="copyLink()"
        >
            <div class="tooltip" id="tooltip">Copied to clipboard</div>

            <code id="generatedLink"></code>

            <span class="copy-icon">📋</span>
        </div>
    </div>
</div>

<script>
	// ----------------------------------------
	// Get all timezone identifiers
	// ----------------------------------------

	const zones = moment.tz.names();

	const select = document.getElementById("timezone");

	// ----------------------------------------
	// Populate dropdown
	// ----------------------------------------

	for (const zone of zones) {
		const option = document.createElement("option");

		option.value = zone;
		option.textContent = zone;

		select.appendChild(option);
	}

	// ----------------------------------------
	// Default to user's timezone
	// ----------------------------------------

	select.value = moment.tz.guess();

	// ----------------------------------------
	// Generate link
	// ----------------------------------------

	function generateLink() {
        const time = document.getElementById("time").value;
        const timezone = document.getElementById("timezone").value;

        const path = window.location.pathname;
        const basePath = path.substring(0, path.lastIndexOf("/") + 1);

        const baseURL = window.location.origin + basePath;

        const url =
            `${baseURL}?t=${encodeURIComponent(time)}&tz=${encodeURIComponent(timezone)}`;

        document.getElementById("generatedLink").textContent = url;
        document.getElementById("result").style.display = "block";
    }

    async function copyLink() {
        const text = document.getElementById("generatedLink").textContent;

        try {
            await navigator.clipboard.writeText(text);

            const tooltip = document.getElementById("tooltip");

            tooltip.classList.add("show");

            setTimeout(() => {
                tooltip.classList.remove("show");
            }, 2000);
        } catch (err) {
            console.error(err);
        }
    }
</script>

</body>
</html>
